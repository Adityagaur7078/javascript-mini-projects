<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Typing Speed Test</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Background Glow -->

    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <!-- Container -->

    <div class="container">

        <!-- Header -->

        <header>

            <h1>⌨️ Typing Speed Test</h1>

            <p class="subtitle">

                Test your typing speed and accuracy

            </p>

        </header>

        <!-- Stats -->

        <section class="stats">

            <div class="stat-card">

                <h3>Time</h3>

                <span class="time">

                    60

                </span>

            </div>

            <div class="stat-card">

                <h3>WPM</h3>

                <span class="wpm">

                    0

                </span>

            </div>

            <div class="stat-card">

                <h3>Accuracy</h3>

                <span class="accuracy">

                    100%

                </span>

            </div>

            <div class="stat-card">

                <h3>Mistakes</h3>

                <span class="mistakes">

                    0

                </span>

            </div>

        </section>

        <!-- Paragraph -->

        <section class="paragraph-box">

            <p class="paragraph">

            </p>

        </section>

        <!-- Typing Area -->

        <section class="typing-box">

            <textarea
                class="typing-input"
                placeholder="Start typing here..."
                spellcheck="false"
            ></textarea>

        </section>

        <!-- Buttons -->

        <section class="buttons">

            <button class="start-btn">

                Start Test

            </button>

            <button class="restart-btn">

                Restart

            </button>

        </section>

        <!-- Result -->

        <section class="result">

            <h2 class="result-message">

                Click "Start Test" to begin.

            </h2>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
