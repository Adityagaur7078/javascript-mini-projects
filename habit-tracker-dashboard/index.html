<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>

        <h1>Habit Tracker Dashboard</h1>

        <p>Build consistency everyday 🚀</p>

    </header>

    <!-- add habit -->
    <div class="habit-form">

        <input type="text" id="habitInput" placeholder="Enter a habit...">

        <select id="category">

            <option value="" selected disabled >Select Category</option>
            <option value="Health">Health</option>
            <option value="Study">Study</option>
            <option value="Fitness">Fitness</option>
            <option value="Coding">Coding</option>

        </select>

        <button id="addBtn">Add Habit</button>

    </div>

    <!-- analytics -->
    <div class="stats">

        <div class="card">
            <h2 id="totalHabits">0</h2>
            <p>Total Habits</p>
        </div>

        <div class="card">
            <h2 id="completedHabits">0</h2>
            <p>Completed</p>
        </div>

        <div class="card">
            <h2 id="streak">0</h2>
            <p>Current Streak</p>
        </div>

    </div>

    <!-- progress -->
    <div class="progress-section">

        <div class="progress-bar-container">

            <div class="progress-bar"></div>

        </div>

        <p id="progressText">0% Completed</p>

    </div>

    <!-- filters -->
    <div class="filters">

        <button class="filter-btn">All</button>
        <button class="filter-btn">Completed</button>
        <button class="filter-btn">Pending</button>

    </div>

    <!-- habits -->
    <div id="habitList"></div>

</div>

<script src="script.js"></script>
</body>
</html>
