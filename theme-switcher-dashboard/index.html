<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Theme Switcher</title>

    <link rel="stylesheet" href="style.css">

    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
        rel="stylesheet"
    />

</head>

<body>

    <div class="app">

        <!-- TOPBAR -->

        <header class="topbar">

            <div>

                <h1>Theme Switcher</h1>

                <p>
                    Change themes and personalize your workspace.
                </p>

            </div>

            <button class="theme-btn">

                <i class="ri-palette-line"></i>

            </button>

        </header>


        <!-- HERO CARD -->

        <section class="hero-card">

            <h2>
                Build Beautiful Interfaces
            </h2>

            <p>
                Switch between futuristic themes and create your
                own visual experience.
            </p>

        </section>


        <!-- THEME GRID -->

        <section class="theme-grid">

            <!-- THEME CARD -->

            <div class="theme-card purple">

                <div class="color-preview"></div>

                <h3>Cyber Purple</h3>

                <button data-theme="purple">
                    Apply Theme
                </button>

            </div>


            <!-- THEME CARD -->

            <div class="theme-card blue">

                <div class="color-preview"></div>

                <h3>Ocean Blue</h3>

                <button data-theme="blue">
                    Apply Theme
                </button>

            </div>


            <!-- THEME CARD -->

            <div class="theme-card green">

                <div class="color-preview"></div>

                <h3>Neon Green</h3>

                <button data-theme="green">
                    Apply Theme
                </button>

            </div>


            <!-- THEME CARD -->

            <div class="theme-card orange">

                <div class="color-preview"></div>

                <h3>Sunset Orange</h3>

                <button data-theme="orange">
                    Apply Theme
                </button>

            </div>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
