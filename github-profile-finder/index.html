<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>GitHub Profile Finder</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Background Glow -->

    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <!-- Container -->

    <div class="container">

        <!-- Header -->

        <header>

            <h1>GitHub Profile Finder</h1>

            <p class="subtitle">

                Search any GitHub profile instantly

            </p>

        </header>

        <!-- Search -->

        <section class="search-section">

            <input
                type="text"
                class="username-input"
                placeholder="Enter GitHub username..."
            >

            <button class="search-btn">

                Search

            </button>

        </section>

        <!-- Status -->

        <p class="status-message">

        </p>

        <!-- Profile Card -->

        <section class="profile-card">

            <img
                src=""
                alt="Profile"
                class="avatar"
            >

            <h2 class="name">

            </h2>

            <p class="username">

            </p>

            <p class="bio">

            </p>

            <div class="profile-info">

                <div class="info-card">

                    <h3>Followers</h3>

                    <span class="followers">

                        0

                    </span>

                </div>

                <div class="info-card">

                    <h3>Following</h3>

                    <span class="following">

                        0

                    </span>

                </div>

                <div class="info-card">

                    <h3>Repositories</h3>

                    <span class="repos">

                        0

                    </span>

                </div>

            </div>

            <div class="extra-info">

                <p>

                    📍
                    <span class="location">

                        -

                    </span>

                </p>

                <p>

                    🏢
                    <span class="company">

                        -

                    </span>

                </p>

                <p>

                    📅 Joined:
                    <span class="joined">

                        -

                    </span>

                </p>

            </div>

            <a
                href="#"
                target="_blank"
                class="profile-link"
            >

                Visit GitHub Profile

            </a>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
