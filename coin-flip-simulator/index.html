<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Coin Flip Simulator</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Background Glow -->

    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <!-- Main Container -->

    <div class="container">

        <!-- Header -->

        <header>

            <h1>🪙 Coin Flip Simulator</h1>

            <p class="subtitle">

                Flip the coin and test your luck

            </p>

        </header>

        <!-- Coin -->

        <div class="coin-container">

            <div class="coin">

                🪙

            </div>

        </div>

        <!-- Buttons -->

        <div class="buttons">

            <button class="flip-btn">

                Flip Coin

            </button>

            <button class="clear-btn">

                Clear History

            </button>

        </div>

        <!-- Statistics -->

        <section class="stats">

            <div class="stat-card">

                <h3>Total Flips</h3>

                <span class="total-flips">

                    0

                </span>

            </div>

            <div class="stat-card">

                <h3>Heads</h3>

                <span class="heads-count">

                    0

                </span>

            </div>

            <div class="stat-card">

                <h3>Tails</h3>

                <span class="tails-count">

                    0

                </span>

            </div>

        </section>

        <!-- Result -->

        <div class="result">

            Click "Flip Coin"

        </div>

        <!-- History -->

        <section class="history">

            <h2>

                Flip History

            </h2>

            <div class="history-list">

            </div>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
