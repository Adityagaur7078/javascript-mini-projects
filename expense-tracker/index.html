<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background Glow -->

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <!-- Main Container -->

    <div class="container">

        <!-- Header -->

        <header>

            <h1>Expense Tracker</h1>

            <p>
                Track every expense with ease
            </p>

        </header>

        <!-- Summary -->

        <section class="summary">

            <div class="summary-card">

                <h3>Total Balance</h3>

                <h2 class="total-balance">
                    ₹0
                </h2>

            </div>

            <div class="summary-grid">

                <div class="income-card">

                    <h4>Total Income</h4>

                    <span class="total-income">
                        ₹0
                    </span>

                </div>

                <div class="expense-card">

                    <h4>Total Expense</h4>

                    <span class="total-expense">
                        ₹0
                    </span>

                </div>

            </div>

        </section>

        <!-- Add Expense -->

        <section class="form-section">

            <h2>Add Transaction</h2>

            <div class="form-group">

                <input
                    type="text"
                    placeholder="Title"
                    class="title-input"
                >

            </div>

            <div class="form-group">

                <input
                    type="number"
                    placeholder="Amount"
                    class="amount-input"
                >

            </div>

            <div class="form-group">

                <select class="type-input">

                    <option value="income">
                        Income
                    </option>

                    <option value="expense">
                        Expense
                    </option>

                </select>

            </div>

            <div class="form-group">

                <select class="category-input">

                    <option value="Food">Food</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Travel">Travel</option>
                    <option value="Salary">Salary</option>
                    <option value="Bills">Bills</option>
                    <option value="Health">Health</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Others">Others</option>

                </select>

            </div>

            <button class="add-btn">

                Add Transaction

            </button>

        </section>

        <!-- Search -->

        <section class="search-section">

            <input
                type="text"
                placeholder="Search transaction..."
                class="search-input"
            >

        </section>

        <!-- Filter -->

        <section class="filter-section">

            <button class="all-btn active">
                All
            </button>

            <button class="income-btn">
                Income
            </button>

            <button class="expense-btn">
                Expense
            </button>

        </section>

        <!-- Stats -->

        <section class="stats">

            <h3>

                Total Transactions :

                <span class="total-transactions">

                    0

                </span>

            </h3>

        </section>

        <!-- Transaction List -->

        <section class="transaction-list">

            <!-- Dynamic Transactions -->

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
