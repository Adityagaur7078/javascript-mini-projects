<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CyberVault</title>

    <link rel="stylesheet" href="style.css">

    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
        rel="stylesheet"
    />

</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <div class="logo">

                <div class="logo-circle"></div>

                <h1>CyberVault</h1>

            </div>

            <nav class="menu">

                <a href="#" class="active">

                    <i class="ri-dashboard-line"></i>

                    Dashboard

                </a>

                <a href="#">

                    <i class="ri-sticky-note-line"></i>

                    Notes

                </a>

            </nav>

        </aside>


        <!-- MAIN -->

        <main class="main">

            <!-- TOPBAR -->

            <header class="topbar">

                <div>

                    <h2>Your ideas are secured.</h2>

                    <p>
                        Store thoughts, plans and secure notes
                        inside your futuristic vault.
                    </p>

                </div>

            </header>


            <!-- HERO -->

            <section class="hero-card">

                <div class="hero-content">

                    <span>PRIVATE WORKSPACE</span>

                    <h1>
                        Organize your digital brain with style.
                    </h1>

                    <p>
                        CyberVault helps you manage thoughts,
                        ideas and secure notes in one system.
                    </p>

                    <button class="hero-btn">
                        Create New Note
                    </button>

                </div>

                <div class="hero-glow"></div>

            </section>


            <!-- SEARCH -->

            <section class="search-section">

                <div class="search-box">

                    <i class="ri-search-line"></i>

                    <input
                        type="text"
                        placeholder="Search your notes..."
                    >

                </div>

            </section>


            <!-- NOTES HEADER -->

            <section class="notes-header">

                <h2>Recent Notes</h2>

            </section>


            <!-- NOTES GRID -->

            <section class="notes-grid"></section>

        </main>

    </div>


    <!-- FLOAT BUTTON -->

    <button class="floating-btn">

        <i class="ri-add-line"></i>

    </button>


    <!-- MODAL -->

    <div class="modal">

        <div class="modal-content">

            <div class="modal-top">

                <h2>Create Note</h2>

                <i class="ri-close-line close-modal"></i>

            </div>


            <input
                type="text"
                placeholder="Enter note title..."
                class="note-title"
            >


            <textarea
                placeholder="Write your thoughts..."
                class="note-content"
            ></textarea>


            <select class="note-category">

                <option value="">
                    Select Category
                </option>

                <option value="Ideas">
                    Ideas
                </option>

                <option value="Personal">
                    Personal
                </option>

                <option value="Work">
                    Work
                </option>

                <option value="Goals">
                    Goals
                </option>

            </select>


            <button class="save-note-btn">
                Save Note
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
