<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Dice Roller</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <div class="container">

        <h1>🎲 Dice Roller</h1>

        <p class="subtitle">
            Roll the dice and test your luck
        </p>

        <div class="dice">

            🎲

        </div>

        <button class="roll-btn">

            Roll Dice

        </button>

        <div class="stats">

            <h3>

                Total Rolls :
                <span class="total-rolls">

                    0

                </span>

            </h3>

        </div>

        <div class="history">

            <h2>

                Roll History

            </h2>

            <div class="history-list">

            </div>

        </div>

        <button class="clear-btn">

            Clear History

        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
