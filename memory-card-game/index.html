<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Memory Card Game</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <div class="container">

        <h1>🧠 Memory Card Game</h1>

        <p class="subtitle">
            Match all the pairs to win
        </p>

        <div class="stats">

            <div class="card">

                <h3>Moves</h3>

                <span class="moves">
                    0
                </span>

            </div>

            <div class="card">

                <h3>Matched</h3>

                <span class="matched">
                    0 / 8
                </span>

            </div>

            <div class="card">

                <h3>Time</h3>

                <span class="timer">
                    00:00
                </span>

            </div>

        </div>

        <div class="game-board">

        </div>

        <button class="restart-btn">

            Restart Game

        </button>

        <div class="message">

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
