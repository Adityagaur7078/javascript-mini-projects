<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay">
        <div class="container">

            <img
                src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200"
                alt="Coming Soon"
                class="hero-image"
            >

            <span class="badge">🚀 Launching Soon</span>

            <h1>Something Amazing Is Coming</h1>

            <p>
                We're working hard to launch our new website.
                Stay tuned for updates and exciting features.
            </p>

            <div class="countdown">
                <div class="box">
                    <span id="days">00</span>
                    <small>Days</small>
                </div>

                <div class="box">
                    <span id="hours">00</span>
                    <small>Hours</small>
                </div>

                <div class="box">
                    <span id="minutes">00</span>
                    <small>Minutes</small>
                </div>

                <div class="box">
                    <span id="seconds">00</span>
                    <small>Seconds</small>
                </div>
            </div>

            <form class="notify-form">
                <input
                    type="email"
                    placeholder="Enter your email"
                    required
                >
                <button type="submit">
                    Notify Me
                </button>
            </form>

            <p id="message"></p>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
