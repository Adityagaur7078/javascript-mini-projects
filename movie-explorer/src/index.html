<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Explorer</title>

    <link href="./output.css" rel="stylesheet">
</head>

<body class="bg-slate-900 min-h-screen text-slate-200">

    <div class="max-w-6xl mx-auto p-6">

        <!-- Header -->
        <div class="text-center">

            <h1 class="text-5xl font-bold text-slate-100">
                🎬 Movie Explorer
            </h1>

            <p class="text-slate-400 mt-3">
                Search and discover movies
            </p>

        </div>

        <!-- Search Box -->
        <div class="bg-slate-800 rounded-2xl shadow-lg p-6 mt-8 border border-slate-700">

            <div class="flex gap-3">

                <input type="text" placeholder="Search movie..."
                    class="movie-input flex-1 bg-slate-700 text-slate-100 border border-slate-600 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 placeholder:text-slate-400">

                <button
                    class="search-btn bg-blue-600 hover:bg-blue-500 transition text-white px-6 py-3 rounded-lg font-medium">
                    Search
                </button>

            </div>

        </div>

        <!-- Status -->
        <div class="status-message text-center text-slate-400 mt-6">
        </div>

        <!-- Movies Container -->
        <div class="movies-container grid md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8">

            <!-- Movies will come here -->

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
